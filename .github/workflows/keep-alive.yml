# Supabase free-tier projects auto-pause after ~a week without database
# activity — which silently takes the submission endpoint down. This ping
# queries PostgREST (real DB activity) twice a week to keep it awake.
# The key is the project's publishable (anon) key: public by design, and
# RLS on the table means it can read nothing.
name: keep-alive

on:
  schedule:
    - cron: "17 6 * * 1,4"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Touch the submissions database
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://jaxzkldvifgmqnoahvom.supabase.co/rest/v1/submissions?select=id&limit=1" \
            -H "apikey: sb_publishable_Peg87NGh3EzFaVi8vBH5zA_oBz6oSwZ")
          echo "PostgREST responded $code"
          [ "$code" = "200" ] || exit 1
